<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Bethel Residency</title>
  <script>
    // GitHub Pages SPA redirect: save the full path to sessionStorage and redirect to index.html
    var path = window.location.pathname.replace(/\/$/, '');
    if (path !== '') {
      sessionStorage.setItem('spa_redirect', path + window.location.search + window.location.hash);
    }
    window.location.replace('/');
  </script>
</head>
<body></body>
</html>
